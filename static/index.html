<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT领域知识问答系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #a78bfa;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-glass: rgba(255,255,255,0.72);
            --surface-glass-border: rgba(255,255,255,0.45);
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'SF Pro Display', system-ui, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            font-family: var(--font);
            line-height: 1.65;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(ellipse 80% 60% at 20% 50%, rgba(102,126,234,0.06) 0%, transparent 50%),
                radial-gradient(ellipse 60% 70% at 80% 20%, rgba(118,75,162,0.05) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 50% 80%, rgba(99,102,241,0.04) 0%, transparent 50%),
                linear-gradient(175deg, #f0f2f5 0%, #e8ecf1 40%, #eef0f4 100%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
        }
        header {
            position: relative; z-index: 10;
            background: rgba(255,255,255,0.58);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.5);
            padding: 0.85rem 1.5rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        header h1 {
            font-size: 1.15rem; font-weight: 600; letter-spacing: 0.02em;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .container {
            position: relative; z-index: 1; flex: 1;
            max-width: 1280px; width: 100%; margin: 0 auto;
            padding: 0.85rem 1rem; display: flex; min-height: 0;
        }
        .chat-container {
            flex: 1; display: flex; border-radius: var(--radius-lg); overflow: hidden;
            background: var(--surface-glass);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--surface-glass-border);
            box-shadow: var(--shadow-md);
        }
        .sidebar {
            width: 260px; min-width: 260px;
            background: rgba(248,249,252,0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0,0,0,0.06);
            padding: 1.15rem; display: flex; flex-direction: column;
        }
        .session-controls { display: flex; gap: 0.5rem; margin-bottom: 1.15rem; }
        .session-controls button { flex: 1; min-width: 0; }
        .new-session-btn, .clear-history-btn {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 0.45rem 0.6rem; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.8rem; font-family: var(--font);
            font-weight: 500;
            transition: all var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 0.35rem;
            white-space: nowrap;
        }
        .new-session-btn:hover {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: #fff; border-color: transparent;
            box-shadow: 0 2px 12px rgba(102,126,234,0.35);
            transform: translateY(-1px);
        }
        .clear-history-btn:hover {
            background: #fef2f2; color: #ef4444; border-color: #fecaca;
            transform: translateY(-1px);
        }
        .new-session-btn:active, .clear-history-btn:active { transform: scale(0.97); }
        .history-title {
            font-weight: 600; font-size: 0.8rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem;
        }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item {
            padding: 0.65rem 0.75rem; border-radius: var(--radius-sm);
            cursor: pointer; margin-bottom: 0.3rem;
            transition: all var(--transition);
            border: 1px solid transparent;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.7);
            border-color: rgba(0,0,0,0.06);
            box-shadow: var(--shadow-xs);
            transform: translateX(2px);
        }
        .history-question {
            font-weight: 600; font-size: 0.82rem; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-answer {
            color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.15rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .session-info {
            font-size: 0.72rem; color: var(--text-muted); margin-top: 0.75rem;
            padding-top: 0.75rem; border-top: 1px solid rgba(0,0,0,0.06);
            text-align: center;
        }
        .main-content {
            flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;
        }
        .chat-history {
            flex: 1; padding: 1.25rem 1.5rem; overflow-y: auto;
            scroll-behavior: smooth;
            display: flex; flex-direction: column; gap: 0.6rem;
        }
        .chat-history::-webkit-scrollbar { width: 5px; }
        .chat-history::-webkit-scrollbar-track { background: transparent; }
        .chat-history::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 10px; }
        .chat-history::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 10px; }
        .message {
            display: flex; flex-direction: column;
            animation: messageIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .message-content {
            padding: 0.75rem 1.1rem; max-width: 78%; word-break: break-word;
            line-height: 1.65; font-size: 0.925rem;
        }
        .user-message { align-self: flex-end; align-items: flex-end; }
        .user-message .message-content {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: #fff;
            border-radius: var(--radius-lg) var(--radius-lg) 6px var(--radius-lg);
            box-shadow: 0 4px 18px rgba(102,126,234,0.28);
        }
        .system-message { align-self: flex-start; align-items: flex-start; }
        .system-message .message-content {
            background: var(--surface);
            color: var(--text);
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 6px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.04);
        }
        .system-message.streaming .message-content::after {
            content: '';
            display: inline-block; width: 1.5px; height: 1em;
            background: var(--primary); margin-left: 2px; vertical-align: text-bottom;
            animation: cursorBlink 1s step-end infinite;
        }
        @keyframes messageIn {
            0% { transform: translateY(18px) scale(0.94); opacity: 0; }
            50% { transform: translateY(-5px) scale(1.03); opacity: 1; }
            75% { transform: translateY(2px) scale(0.99); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .chat-input-container {
            position: relative; z-index: 5;
            padding: 0.85rem 1.25rem 1rem;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }
        .source-filter {
            display: flex; align-items: center; margin-bottom: 0.55rem; gap: 0.5rem;
        }
        .source-filter label {
            font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; white-space: nowrap;
        }
        .source-filter select {
            padding: 0.3rem 0.65rem; border-radius: var(--radius-sm);
            border: 1px solid rgba(0,0,0,0.10);
            background: var(--surface); color: var(--text);
            font-size: 0.82rem; font-family: var(--font);
            cursor: pointer; outline: none;
            transition: all var(--transition);
        }
        .source-filter select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        .input-group { display: flex; gap: 0.5rem; align-items: flex-end; }
        .chat-input {
            flex: 1; padding: 0.65rem 0.9rem;
            border: 1px solid rgba(0,0,0,0.10);
            border-radius: var(--radius-md);
            font-size: 0.92rem; font-family: var(--font);
            resize: none; height: 42px; max-height: 140px;
            overflow-y: auto; outline: none;
            background: var(--surface);
            color: var(--text);
            transition: all var(--transition);
            line-height: 1.5;
        }
        .chat-input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.10);
        }
        .chat-input::placeholder { color: var(--text-muted); }
        .send-btn {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: #fff; border: none;
            padding: 0 1.1rem; height: 42px; border-radius: var(--radius-md);
            cursor: pointer; font-size: 1rem; min-width: 48px;
            transition: all var(--transition);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 12px rgba(102,126,234,0.3);
        }
        .send-btn:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 6px 24px rgba(102,126,234,0.45);
        }
        .send-btn:active {
            transform: scale(0.94);
            box-shadow: 0 1px 6px rgba(102,126,234,0.25);
        }
        .send-btn:disabled {
            background: #cbd5e1; color: #94a3b8; cursor: not-allowed;
            box-shadow: none; transform: none;
        }
        .typing-indicator {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 0.75rem 1.1rem; background: var(--surface);
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 6px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.04);
            align-self: flex-start;
        }
        .typing-indicator span {
            width: 7px; height: 7px; border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
        }
        .typing-indicator span:nth-child(1) { animation: bounce 1.4s ease-in-out infinite; }
        .typing-indicator span:nth-child(2) { animation: bounce 1.4s ease-in-out 0.2s infinite; }
        .typing-indicator span:nth-child(3) { animation: bounce 1.4s ease-in-out 0.4s infinite; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
        .loading-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loading-overlay.visible { visibility: visible; opacity: 1; }
        .spinner {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--primary), var(--accent), transparent);
            mask: radial-gradient(farthest-side, transparent calc(100% - 3.5px), #000 calc(100% - 3.5px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3.5px), #000 calc(100% - 3.5px));
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin: 0.5rem 0 0.3rem; line-height: 1.3;
        }
        .message-content h1 { font-size: 1.25rem; }
        .message-content h2 { font-size: 1.15rem; }
        .message-content h3 { font-size: 1.05rem; }
        .message-content p { margin: 0.3rem 0; }
        .message-content p:first-child { margin-top: 0; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content ul, .message-content ol { padding-left: 1.4rem; margin: 0.3rem 0; }
        .message-content li { margin: 0.15rem 0; }
        .message-content code {
            font-family: var(--font-mono); font-size: 0.85em;
            background: rgba(0,0,0,0.06); padding: 0.15em 0.4em; border-radius: 4px;
        }
        .user-message .message-content code {
            background: rgba(255,255,255,0.2); color: #fff;
        }
        .message-content pre { margin: 0.4rem 0; border-radius: var(--radius-sm); overflow-x: auto; }
        .message-content pre code {
            display: block; padding: 0.75rem 1rem;
            background: #1a1a2e; color: #e2e8f0;
            font-size: 0.82rem; line-height: 1.55; border-radius: var(--radius-sm);
        }
        .message-content blockquote {
            border-left: 3px solid var(--primary-light); padding-left: 0.75rem;
            margin: 0.4rem 0; color: var(--text-secondary);
        }
        .message-content a { color: var(--primary); text-decoration: none; }
        .message-content a:hover { text-decoration: underline; }
        .message-content table {
            border-collapse: collapse; width: 100%; margin: 0.4rem 0; font-size: 0.85rem;
        }
        .message-content th, .message-content td {
            border: 1px solid rgba(0,0,0,0.1); padding: 0.4rem 0.6rem; text-align: left;
        }
        .message-content th { background: rgba(0,0,0,0.03); font-weight: 600; }
        .message-content hr { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 0.6rem 0; }
        @media (max-width: 768px) {
            .chat-container { flex-direction: column; }
            .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.06); max-height: 180px; padding: 0.75rem; }
            .history-list { max-height: 80px; }
            .chat-history { padding: 0.75rem 0.85rem; }
            .message-content { max-width: 92%; font-size: 0.88rem; }
            .chat-input-container { padding: 0.65rem 0.75rem 0.75rem; }
            .container { padding: 0.4rem 0.5rem; }
        }
    </style>
</head>
<body>
    <header><h1>IT知识智慧问答系统</h1></header>
    <div class="container">
        <div class="chat-container">
            <div class="sidebar">
                <div class="session-controls">
                    <button class="new-session-btn" id="newSessionBtn"><i class="fas fa-plus"></i> 新会话</button>
                    <button class="clear-history-btn" id="clearHistoryBtn"><i class="fas fa-trash"></i> 清除历史</button>
                </div>
                <div class="history-title">历史会话</div>
                <div class="history-list" id="historyList"></div>
                <div class="session-info" id="sessionInfo"></div>
            </div>
            <div class="main-content">
                <div class="chat-history" id="chatHistory">
                    <div class="message system-message"><div class="message-content">您好！我是智能问答助手，有什么我可以帮助您的吗？</div></div>
                </div>
                <div class="chat-input-container">
                    <div class="source-filter">
                        <label for="sourceFilter">学科类别：</label>
                        <select id="sourceFilter"><option value="">全部</option></select>
                    </div>
                    <div class="input-group">
                        <textarea class="chat-input" id="chatInput" placeholder="输入您的问题..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
    <script>
        let currentSessionId = null;
        let isResponseInProgress = false;
        let socket = null;
        const chatHistory = document.getElementById('chatHistory');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const sourceFilter = document.getElementById('sourceFilter');
        const historyList = document.getElementById('historyList');
        const sessionInfo = document.getElementById('sessionInfo');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const API_BASE_URL = '';
        document.addEventListener('DOMContentLoaded', async () => {
            await createNewSession();
            await loadSources();
            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });
            newSessionBtn.addEventListener('click', createNewSession);
            clearHistoryBtn.addEventListener('click', clearHistory);
        });
        async function createNewSession() {
            try {
                const response = await fetch(API_BASE_URL + '/api/create_session', { method: 'POST' });
                if (!response.ok) throw new Error('会话创建失败');
                const data = await response.json();
                currentSessionId = data.session_id;
                sessionInfo.textContent = '会话ID: ' + currentSessionId.slice(0, 8) + '...';
                clearChatHistory();
                await loadHistory();
            } catch (error) {
                console.error('创建会话错误:', error);
                alert('创建会话失败，请刷新页面重试');
            }
        }
        async function loadSources() {
            try {
                const response = await fetch(API_BASE_URL + '/api/sources');
                if (!response.ok) throw new Error('获取学科类别失败');
                const data = await response.json();
                sourceFilter.innerHTML = '<option value="">全部</option>';
                data.sources.forEach(source => {
                    const option = document.createElement('option');
                    option.value = source;
                    option.textContent = source;
                    sourceFilter.appendChild(option);
                });
            } catch (error) { console.error('加载学科类别错误:', error); }
        }
        async function loadHistory() {
            if (!currentSessionId) return;
            try {
                const response = await fetch(API_BASE_URL + '/api/history/' + currentSessionId);
                if (!response.ok) throw new Error('获取历史记录失败');
                const data = await response.json();
                historyList.innerHTML = '';
                const sessionItem = document.createElement('div');
                sessionItem.className = 'history-item';
                sessionItem.innerHTML = '<div class="history-question">会话 ' + currentSessionId.slice(0, 8) + '...</div><div class="history-answer">共 ' + data.history.length + ' 轮对话</div>';
                sessionItem.addEventListener('click', () => {
                    clearChatHistory();
                    data.history.forEach(item => { addMessage('user', item.question); addMessage('system', item.answer); });
                    scrollToBottom();
                });
                historyList.appendChild(sessionItem);
            } catch (error) { console.error('加载历史记录错误:', error); }
        }
        async function clearHistory() {
            if (!currentSessionId) return;
            try {
                const response = await fetch(API_BASE_URL + '/api/history/' + currentSessionId, { method: 'DELETE' });
                if (!response.ok) throw new Error('清除历史记录失败');
                historyList.innerHTML = '';
                clearChatHistory();
                chatHistory.innerHTML = '<div class="message system-message"><div class="message-content">历史记录已清除，有什么我可以帮助您的吗？</div></div>';
            } catch (error) { console.error('清除历史记录错误:', error); alert('清除历史记录失败'); }
        }
        function clearChatHistory() {
            chatHistory.innerHTML = '<div class="message system-message"><div class="message-content">您好！我是智能问答助手，有什么我可以帮助您的吗？</div></div>';
        }
        async function sendMessage() {
            const query = chatInput.value.trim();
            const filter = sourceFilter.value;
            if (!query || isResponseInProgress) return;
            chatInput.value = '';
            chatInput.style.height = 'auto';
            addMessage('user', query);
            isResponseInProgress = true;
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = '<span></span><span></span><span></span>';
            chatHistory.appendChild(typingIndicator);
            scrollToBottom();
            try {
                const response = await fetch(API_BASE_URL + '/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, source_filter: filter, session_id: currentSessionId })
                });
                if (!response.ok) throw new Error('查询失败');
                const data = await response.json();
                if (typingIndicator.parentNode) chatHistory.removeChild(typingIndicator);
                if (data.is_streaming) {
                    const messageElement = document.createElement('div');
                    messageElement.className = 'message system-message streaming';
                    const contentElement = document.createElement('div');
                    contentElement.className = 'message-content';
                    messageElement.appendChild(contentElement);
                    chatHistory.appendChild(messageElement);
                    await handleStreamingResponse(query, filter, contentElement, messageElement);
                } else {
                    addMessage('system', data.answer);
                }
                await loadHistory();
            } catch (error) {
                console.error('发送消息错误:', error);
                if (typingIndicator.parentNode) chatHistory.removeChild(typingIndicator);
                addMessage('system', '抱歉，发生错误: ' + error.message);
            } finally {
                isResponseInProgress = false;
                scrollToBottom();
            }
        }
        async function handleStreamingResponse(query, filter, contentElement, messageElement) {
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            return new Promise((resolve, reject) => {
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = wsProtocol + '//' + window.location.host + API_BASE_URL + '/api/stream';
                socket = new WebSocket(wsUrl);
                let accumulatedContent = '';
                socket.onopen = function() {
                    console.log('WebSocket 连接已建立');
                    socket.send(JSON.stringify({ query: query, source_filter: filter, session_id: currentSessionId }));
                };
                socket.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    switch (data.type) {
                        case 'start': console.log('流式响应开始'); break;
                        case 'token':
                            accumulatedContent += data.token;
                            contentElement.innerHTML = marked.parse(accumulatedContent);
                            scrollToBottom();
                            break;
                        case 'end':
                            console.log('流式响应结束');
                            if (messageElement) messageElement.classList.remove('streaming');
                            socket.close();
                            resolve();
                            break;
                        case 'error':
                            console.error('流式响应错误:', data.error);
                            contentElement.innerHTML += '<p>[错误: ' + data.error + ']</p>';
                            if (messageElement) messageElement.classList.remove('streaming');
                            socket.close();
                            reject(new Error(data.error));
                            break;
                    }
                };
                socket.onerror = function(error) {
                    console.error('WebSocket 错误:', error);
                    contentElement.innerHTML += '<p>[连接错误]</p>';
                    if (messageElement) messageElement.classList.remove('streaming');
                    reject(error);
                };
                socket.onclose = function() {
                    console.log('WebSocket 连接已关闭');
                    if (messageElement) messageElement.classList.remove('streaming');
                    resolve();
                };
            });
        }
        function addMessage(type, content) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message ' + (type === 'user' ? 'user-message' : 'system-message');
            const contentElement = document.createElement('div');
            contentElement.className = 'message-content';
            contentElement.innerHTML = marked.parse(content);
            messageElement.appendChild(contentElement);
            chatHistory.appendChild(messageElement);
            scrollToBottom();
        }
        function scrollToBottom() { chatHistory.scrollTop = chatHistory.scrollHeight; }
    </script>
</body>
</html>
